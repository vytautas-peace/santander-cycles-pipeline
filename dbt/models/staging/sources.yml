version: 2

sources:
  - name: raw
    database: "{{ var('project_id') }}"
    schema: santander_cycles_raw
    description: "Raw TfL Santander Cycles data ingested from GCS Parquet files"
    tables:
      - name: raw_journeys
        description: >
          External BigQuery table pointing to Parquet files in GCS.
          Hive-partitioned by start_year and start_month.
          Schema may include null values for older eras missing certain columns.
        columns:
          - name: journey_id
            description: Unique identifier for each hire rental
          - name: duration_seconds
            description: Journey duration in seconds (renamed from Duration in 2018+)
          - name: bike_id
            description: Bike identifier
          - name: start_datetime
            description: Journey start timestamp
          - name: end_datetime
            description: Journey end timestamp
          - name: start_station_id
            description: ID of the docking station where the bike was hired
          - name: end_station_id
            description: ID of the docking station where the bike was returned
          - name: start_station_name
            description: Name of the start docking station
          - name: end_station_name
            description: Name of the end docking station
          - name: bike_model
            description: Bike model (available from 2022+; null for older records)
          - name: source_file
            description: Original TfL CSV filename (for lineage tracking)
          - name: start_year
            description: Hive partition column — year of start_datetime
          - name: start_month
            description: Hive partition column — month of start_datetime
