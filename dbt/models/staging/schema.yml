version: 2

sources:
  - name: raw
    database: "{{ env_var('GCP_PROJECT') }}"
    schema: santander_cycles_raw
    tables:
      - name: raw_rides
        description: "Raw TfL Santander Cycles journey data loaded by Prefect"
        columns:
          - name: rental_id
            description: "Unique identifier for each rental"
            tests:
              - not_null
              - unique
          - name: start_date
            description: "Journey start timestamp (UTC)"
            tests: [not_null]
          - name: duration
            description: "Journey duration in seconds"
          - name: start_station_id
            description: "Docking station ID where journey started"
          - name: end_station_id
            description: "Docking station ID where journey ended"

models:
  - name: stg_rides
    description: "Cleaned and typed rides from raw TfL data"
    columns:
      - name: rental_id
        tests: [not_null, unique]
      - name: start_date_utc
        tests: [not_null]
      - name: duration_seconds
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 86400  # cap at 24 hours
