version: 2

models:
  - name: fct_rides
    description: >
      Central fact table. One row per completed journey.
      Partitioned by ride_month (DATE granularity) for efficient time-range scans.
      Clustered by [start_station_id, end_station_id] because the most common
      analytical queries filter or group by origin-destination pairs.
    columns:
      - name: ride_sk
        description: "Surrogate key (SHA-256 of rental_id)"
        tests: [not_null, unique]
      - name: rental_id
        tests: [not_null, unique]
      - name: ride_month
        description: "Partition key — first day of the ride month"
        tests: [not_null]
      - name: duration_seconds
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 1
              max_value: 86400
      - name: start_station_id
        tests: [not_null]
      - name: end_station_id
        tests: [not_null]

  - name: dim_stations
    description: >
      Station dimension. One row per unique docking station.
      Station names are the most-recently-observed value (some stations were renamed).
      Borough is extracted from the name suffix pattern "Name, Borough".
      Clustered by borough for fast geographic filtering.
    columns:
      - name: station_id
        tests: [not_null, unique]
      - name: station_name
        tests: [not_null]
      - name: borough
        tests: [not_null]

  - name: mart_monthly_summary
    description: >
      Pre-aggregated monthly ride metrics. Feeds dashboard Tile 1 (rides over time).
      Partitioned by ride_month for efficient date-range queries.
    columns:
      - name: ride_month
        tests: [not_null, unique]
      - name: total_rides
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0

  - name: mart_station_stats
    description: >
      Per-station aggregations. Feeds dashboard Tile 2 (top stations).
      Clustered by borough for geographic drill-downs.
    columns:
      - name: station_id
        tests: [not_null, unique]
      - name: total_activity
        tests: [not_null]
