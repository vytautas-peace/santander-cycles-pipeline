id: source_
namespace: prod

# Optimised source layer — single Python task replaces discover + ForEach(download+process+upload).
#
# Speed gains vs source_v2 (baseline 15s for 1-month):
#   - BQ metadata write runs in a background thread, overlapping with file processing (~3s saved)
#   - One Python process for all files: eliminates N × (uv startup + BQ metadata query) (~2s saved)
#   - Parallel downloads + parallel zip-member processing inside Python
#   - GCS existence check skips already-uploaded parquets (re-runs near-instant)

inputs:

  - id: start_date
    type: DATE
    defaults: "2012-01-01"

  - id: end_date
    type: DATE
    defaults: "2025-12-31"

  - id: project
    type: STRING
    defaults: san-cycles-data-pipe

  - id: location
    type: STRING
    defaults: asia-southeast1

  - id: bucket
    type: STRING
    defaults: san-cycles-data-pipe-bkt

  - id: workers
    type: INT
    defaults: 16


tasks:

  - id: check_http_request
    type: io.kestra.plugin.core.http.Request
    uri: https://google.com
    method: GET

  - id: uv_sync
    type: io.kestra.plugin.scripts.python.Commands
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    containerImage: python:3.13-slim
    commands:
      - cd /workspace/kestra && uv sync --quiet

  - id: run
    type: io.kestra.plugin.scripts.python.Commands
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    env:
      GCP_SERVICE_ACCOUNT: "{{ secret('GCP_SERVICE_ACCOUNT') }}"
      GCLOUD_PROJECT: "{{ inputs.project }}"
      LOCATION: "{{ inputs.location }}"
      GCS_BUCKET: "{{ inputs.bucket }}"
    commands:
      - |
        cd /workspace/kestra
        uv run python/source.py \
          --start-date {{ inputs.start_date }} \
          --end-date {{ inputs.end_date }} \
          --workers {{ inputs.workers }}
