volumes:
  postgres-data:
    driver: local

services:

  kestra-postgres:
    image: postgres:18
    volumes:
      - postgres-data:/var/lib/postgresql
    environment:
      POSTGRES_DB: kestra
      POSTGRES_USER: kestra
      POSTGRES_PASSWORD: k3str4
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 30s
      timeout: 10s
      retries: 10

  kestra:
    image: kestra/kestra:v1.3-no-plugins
    pull_policy: missing
    stop_grace_period: 6m
    user: "root"
    entrypoint: /bin/sh -c "
      /app/kestra plugins install io.kestra.plugin:plugin-script-python:1.7.0 && \
      /app/kestra plugins install io.kestra.plugin:plugin-gcp:2.2.0 && \
      /app/kestra server standalone"
    volumes:
      - /tmp/kestra-storage:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/kestra-wd:/tmp/kestra-wd
      - ../:/workspace
    env_file: ../secrets/.env_encoded
    environment:
      KESTRA_CONFIGURATION: |
        micronaut:
          io:
            watch:
              enabled: true
              paths:
                - /workspace/kestra/flows
        datasources:
          postgres:
            url: jdbc:postgresql://kestra-postgres:5432/kestra
            driverClassName: org.postgresql.Driver
            username: kestra
            password: k3str4
        kestra:
          server:
            basic-auth:
              username: admin@kestra.io
              password: Admin1234!
          repository:
            type: postgres
          storage:
            type: local
            local:
              base-path: "/app/storage"
          queue:
            type: postgres
          tasks:
            tmp-dir:
              path: /tmp/kestra-wd/tmp
          url: http://localhost:8080
          tutorial-flows:
            enabled: false
          worker:
            instance:
              partitions: 24
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      kestra-postgres:
        condition: service_started

  streamlit:
    image: ghcr.io/astral-sh/uv:python3.13-bookworm-slim
    working_dir: /workspace/streamlit
    env_file: ../.env
    environment:
      UV_PROJECT_ENVIRONMENT: /opt/venv
    volumes:
      - ../:/workspace
    ports:
      - "8501:8501"
    command: >
      uv run streamlit run dashboard.py
      --server.port=8501
      --server.address=0.0.0.0
    restart: unless-stopped
