name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
  GCS_BUCKET:  ${{ secrets.GCS_BUCKET }}
  GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json

jobs:
  test-prefect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Lint
        run: uv run ruff check prefect/
      - name: Unit tests
        run: uv run pytest scripts/test_pipeline.py -v --tb=short

  dbt-compile:
    runs-on: ubuntu-latest
    needs: test-prefect
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Write GCP key
        run: echo '${{ secrets.GCP_SA_KEY }}' > /tmp/gcp-key.json
      - name: dbt deps + compile
        working-directory: dbt
        run: |
          uv run dbt deps --profiles-dir .
          uv run dbt compile --profiles-dir . --target dev
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}

  deploy:
    runs-on: ubuntu-latest
    needs: dbt-compile
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Write GCP key
        run: echo '${{ secrets.GCP_SA_KEY }}' > /tmp/gcp-key.json
      - name: Register Prefect deployment
        working-directory: prefect
        run: uv run python schedule.py
        env:
          PREFECT_API_URL: ${{ secrets.PREFECT_API_URL }}
          PREFECT_API_KEY: ${{ secrets.PREFECT_API_KEY }}
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
          GCS_BUCKET:  ${{ secrets.GCS_BUCKET }}
